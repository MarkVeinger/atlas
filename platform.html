          <div style="font-size:10px;font-weight:600;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px;font-family:'Inter',sans-serif">Goals</div>
          ${c.goals&&c.goals.primary?`<div style="font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-warning);flex-shrink:0"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>${esc(c.goals.primary)}</div>`:''}
          ${c.goals&&c.goals.secondary?`<div style="font-size:13px;margin-bottom:4px;display:flex;align-items:center;gap:6px"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent-warning);flex-shrink:0"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>${esc(c.goals.secondary)}</div>`:''}
          ${c.goals&&c.goals.targetDate?`<div style="font-size:11px;color:var(--text-tertiary);font-family:'DM Mono',monospace;margin-top:4px">Target: ${c.goals.targetDate}</div>`:''}
        </div>
      </div>
      ${c.notes?`<div style="margin-top:14px;font-size:13px;color:var(--text-secondary);line-height:1.6;padding:12px;background:var(--bg-secondary);border-radius:8px;border:1px solid var(--border-subtle)">${esc(c.notes)}</div>`:''}
    </div>
    <div class="tab-pane" id="cv-programs">
      ${progs.length?progs.map(p=>`<div class="card" style="margin-bottom:8px;cursor:default"><div style="font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;letter-spacing:-0.01em">${esc(p.name)}</div>${p.notes?`<div style="font-size:12px;color:var(--text-secondary);margin-top:4px">${esc(p.notes)}</div>`:''}</div>`).join(''):`<div class="empty"><div class="empty-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div><h3>No programs assigned</h3><p>Create a program and assign this client to it.</p></div>`}
    </div>
    <div class="tab-pane" id="cv-log">
      <div style="margin-bottom:12px;display:flex;gap:8px">
        <input id="log-note-input" placeholder="Add session note…" style="flex:1;background:var(--bg-primary);border:1px solid var(--border-default);color:var(--text-primary);border-radius:8px;padding:0 12px;height:36px;font-size:13px;font-family:inherit;outline:none">
        <button class="btn btn-accent btn-sm" onclick="addLog('${id}')">Log</button>
      </div>
      ${log.length?log.map(l=>`<div class="log-entry"><div class="log-date">${l.date}</div><div class="log-note">${esc(l.note)}</div></div>`).join(''):`<div style="color:var(--text-tertiary);font-size:13px;padding:16px 0">No sessions logged yet.</div>`}
    </div>`;
  document.getElementById('cl-view-modal').classList.remove('hidden');
}
function closeClView(){document.getElementById('cl-view-modal').classList.add('hidden');}

function switchTab(btn,paneId){
  // Walk up to find the shared parent that holds both .tab-btn and .tab-pane elements
  let root=btn.parentElement;
  while(root&&!root.querySelector('.tab-pane'))root=root.parentElement;
  if(root){
    root.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    root.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  }
  btn.classList.add('active');
  const pane=document.getElementById(paneId);
  if(pane)pane.classList.add('active');
}

function addLog(clientId){
  const note=document.getElementById('log-note-input').value.trim();
  if(!note)return;
  const c=CL_DB.find(x=>x.id===clientId);if(!c)return;
  if(!c.sessionLog)c.sessionLog=[];
  const today=new Date().toISOString().slice(0,10);
  c.sessionLog.push({date:today,note});
  persist();
  document.getElementById('log-note-input').value='';
  openClView(clientId);
}

function openClEdit(id){
  editingClId=id;
  const isNew=id===null;
  document.getElementById('ce-title').textContent=isNew?'New Client':'Edit Client';
  document.getElementById('ce-del-btn').style.display=isNew?'none':'';
  if(isNew){
    ['ce-name','ce-email','ce-phone','ce-goal','ce-goal2','ce-notes'].forEach(i=>document.getElementById(i).value='');
    document.getElementById('ce-dob').value='';
    document.getElementById('ce-target').value='';
    document.getElementById('ce-gender').value='';
    document.getElementById('ce-height').value='';
    document.getElementById('ce-weight').value='';
    document.getElementById('ce-bf').value='';
    document.getElementById('ce-level').value='beginner';
  } else {
    const c=CL_DB.find(x=>x.id===id);if(!c)return;
    document.getElementById('ce-name').value=c.name||'';
    document.getElementById('ce-email').value=c.email||'';
    document.getElementById('ce-phone').value=c.phone||'';
    document.getElementById('ce-dob').value=c.dob||'';
    document.getElementById('ce-gender').value=c.gender||'';
    document.getElementById('ce-height').value=c.stats&&c.stats.height||'';
    document.getElementById('ce-weight').value=c.stats&&c.stats.weight||'';
    document.getElementById('ce-bf').value=c.stats&&c.stats.bodyFat||'';
    document.getElementById('ce-level').value=c.stats&&c.stats.fitnessLevel||'beginner';
    document.getElementById('ce-goal').value=c.goals&&c.goals.primary||'';
    document.getElementById('ce-goal2').value=c.goals&&c.goals.secondary||'';
    document.getElementById('ce-target').value=c.goals&&c.goals.targetDate||'';
    document.getElementById('ce-notes').value=c.notes||'';
  }
  document.getElementById('cl-edit-modal').classList.remove('hidden');
}
function closeClEdit(){document.getElementById('cl-edit-modal').classList.add('hidden');}

function saveClient(){
  const name=document.getElementById('ce-name').value.trim();
  if(!name){alert('Please enter a name.');return;}
  const existing=editingClId&&CL_DB.find(c=>c.id===editingClId);
  const c={
    id:editingClId??('c'+Date.now()),
    name,
    email:document.getElementById('ce-email').value.trim(),
    phone:document.getElementById('ce-phone').value.trim(),
    dob:document.getElementById('ce-dob').value,
    gender:document.getElementById('ce-gender').value,
    notes:document.getElementById('ce-notes').value.trim(),
    stats:{
      height:parseFloat(document.getElementById('ce-height').value)||null,
      weight:parseFloat(document.getElementById('ce-weight').value)||null,
      bodyFat:parseFloat(document.getElementById('ce-bf').value)||null,
      fitnessLevel:document.getElementById('ce-level').value
    },
    goals:{
      primary:document.getElementById('ce-goal').value.trim(),
      secondary:document.getElementById('ce-goal2').value.trim(),
      targetDate:document.getElementById('ce-target').value
    },
    programIds:existing?existing.programIds:[],
    sessionLog:existing?existing.sessionLog:[],
    createdAt:existing?existing.createdAt:Date.now()
  };
  if(editingClId===null){CL_DB.push(c);}
  else{const i=CL_DB.findIndex(x=>x.id===editingClId);if(i>=0)CL_DB[i]=c;}
  persist();closeClEdit();renderClients('');updateCounts();
}
function deleteClient(){
  if(!confirm('Delete this client?'))return;
  CL_DB=CL_DB.filter(c=>c.id!==editingClId);
  persist();closeClEdit();renderClients('');updateCounts();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function updateCounts(){
  loadWorkouts();
  document.getElementById('sidebar-counts').innerHTML=`${WORKOUTS.length} workouts · ${EX_DB.length} exercises<br>${PROG_DB.length} programs · ${CL_DB.length} clients`;
}

// keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    document.querySelectorAll('.modal-bg:not(.hidden)').forEach(m=>{m.classList.add('hidden');});
  }
});

// init
renderWorkouts();
updateCounts();

// ── SW + Offline ─────────────────────────────────────────────────────────────
(function(){
  const badge = document.getElementById('offline-badge');
  function syncOnline(){
    badge.classList.toggle('show', !navigator.onLine);
  }
  window.addEventListener('online',  syncOnline);
  window.addEventListener('offline', syncOnline);
  syncOnline();

  // ── Service Worker registration ─────────────────────────────────────────
  if (!('serviceWorker' in navigator)) return;

  let swReg = null;

  navigator.serviceWorker.register('./sw.js', { scope: './' })
    .then(reg => {
      swReg = reg;

      // Listen for a new SW waiting
      function checkWaiting(r){
        if (r.waiting) showUpdateBanner(r.waiting);
      }
      checkWaiting(reg);
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            showUpdateBanner(newSW);
          }
        });
      });

      // Reload when the new SW takes control
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        window.location.reload();
      });
    })
    .catch(() => {}); // Never break the app

  // ── Update banner ────────────────────────────────────────────────────────
  const banner  = document.getElementById('update-banner');
  const btnRld  = document.getElementById('update-reload');
  const btnDis  = document.getElementById('update-dismiss');
  let pendingSW = null;

  function showUpdateBanner(sw){
    pendingSW = sw;
    banner.classList.add('show');
  }
  btnRld.addEventListener('click', () => {
    if (pendingSW) pendingSW.postMessage('skipWaiting');
  });
  btnDis.addEventListener('click', () => {
    banner.classList.remove('show');
  });

  // ── iOS Add-to-Home-Screen prompt ────────────────────────────────────────
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  const dismissed = localStorage.getItem('atlas_ios_prompt_dismissed');

  if (isIOS && !isStandalone && !dismissed) {
    setTimeout(() => {
      document.getElementById('ios-install').classList.add('show');
    }, 3000);
  }

  document.getElementById('ios-dismiss').addEventListener('click', () => {
    document.getElementById('ios-install').classList.remove('show');
    localStorage.setItem('atlas_ios_prompt_dismissed', '1');
  });
})();
</script>
