<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Bank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--accent:#AAFF00;--bg:#0C0C0C;--bg2:#141414;--bg3:#1C1C1C;--bg4:#252525;--text:#F0F0F0;--muted:#888;--border:rgba(255,255,255,.07);--r:12px;--rl:20px;}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;cursor:none;overflow-x:hidden;}

/* Cursor */
#cur{width:10px;height:10px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s;}
#ring{width:34px;height:34px;border:1.5px solid var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);opacity:.4;transition:width .2s,height .2s,opacity .2s;}

/* Header */
header{position:sticky;top:0;z-index:200;height:60px;background:rgba(12,12,12,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px;gap:20px;}
.logo{font-size:16px;font-weight:900;letter-spacing:-.5px;white-space:nowrap;}
.logo em{color:var(--accent);font-style:normal;}
.sw{flex:1;max-width:320px;position:relative;}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sw input{width:100%;height:36px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:0 12px 0 32px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.sw input:focus{border-color:rgba(170,255,0,.5);}
.sw input::placeholder{color:var(--muted);}
.hstat{font-size:12px;color:var(--muted);white-space:nowrap;}
.hstat strong{color:var(--accent);}
.new-btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:8px;background:var(--accent);color:#000;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:none;border:none;transition:opacity .15s;white-space:nowrap;margin-left:auto;}
.new-btn:hover{opacity:.85;}

/* Layout */
.layout{display:grid;grid-template-columns:224px 1fr;min-height:calc(100vh - 60px);}

/* Sidebar */
.sidebar{background:var(--bg2);border-right:1px solid var(--border);padding:22px 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto;}
.sbs{padding:0 12px;margin-bottom:26px;}
.sbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding:0 8px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;color:var(--muted);cursor:none;transition:background .15s,color .15s;margin-bottom:1px;user-select:none;}
.nav-item:hover{background:var(--bg3);color:var(--text);}
.nav-item.active{background:rgba(170,255,0,.1);color:var(--accent);}
.ni{font-size:15px;width:20px;text-align:center;}
.nc{margin-left:auto;background:var(--bg4);border-radius:20px;padding:1px 7px;font-size:11px;font-weight:600;color:var(--muted);}
.nav-item.active .nc{background:rgba(170,255,0,.15);color:var(--accent);}
.chips{display:flex;flex-wrap:wrap;gap:5px;padding:0 8px;}
.chip{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:none;transition:all .15s;user-select:none;}
.chip:hover,.chip.active{border-color:var(--accent);color:var(--accent);background:rgba(170,255,0,.08);}

/* Main */
.main{padding:28px 32px;}
.pgh{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:18px;}
.pgt{font-size:24px;font-weight:800;letter-spacing:-.5px;}
.pgt em{color:var(--accent);font-style:normal;}
.pgc{font-size:12px;color:var(--muted);}
.sorts{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap;}
.sbtn{padding:5px 13px;border-radius:7px;font-size:12px;font-weight:500;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Inter',sans-serif;cursor:none;transition:all .15s;}
.sbtn:hover,.sbtn.active{border-color:var(--accent);color:var(--accent);}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:13px;}

/* Card */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:20px;cursor:none;transition:border-color .2s,transform .2s,box-shadow .2s;position:relative;overflow:hidden;user-select:none;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);opacity:0;transition:opacity .2s;}
.card:hover{border-color:rgba(170,255,0,.28);transform:translateY(-2px);box-shadow:0 10px 36px rgba(0,0,0,.45);}
.card:hover::before{opacity:1;}
.card-edit{position:absolute;top:14px;right:14px;width:28px;height:28px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);color:var(--muted);font-size:13px;cursor:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;font-family:'Inter',sans-serif;z-index:2;}
.card:hover .card-edit{opacity:1;}
.card-edit:hover{border-color:var(--accent);color:var(--accent);background:rgba(170,255,0,.1);}
.ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.badge{font-size:9.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.bs{background:rgba(239,68,68,.15);color:#ef4444;}
.be{background:rgba(59,130,246,.15);color:#3b82f6;}
.bm{background:rgba(34,197,94,.15);color:#22c55e;}
.bc{background:rgba(249,115,22,.15);color:#f97316;}
.bw{background:rgba(168,85,247,.15);color:#a855f7;}
.bh{background:rgba(170,255,0,.15);color:var(--accent);}
.ddot{width:8px;height:8px;border-radius:50%;margin-top:4px;}
.de{background:#22c55e;}.dm{background:#f59e0b;}.dh{background:#ef4444;}.dx{background:#ec4899;}
.ctitle{font-size:15px;font-weight:700;letter-spacing:-.3px;line-height:1.35;margin-bottom:6px;}
.cdesc{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:13px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.cmeta{display:flex;gap:13px;margin-bottom:12px;}
.cm{display:flex;align-items:center;gap:4px;font-size:11.5px;color:var(--muted);}
.ctags{display:flex;flex-wrap:wrap;gap:4px;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--muted);border:1px solid var(--border);}

/* View Modal */
.overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.82);backdrop-filter:blur(10px);display:flex;align-items:flex-start;justify-content:center;padding:36px 20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:700px;transform:translateY(18px);transition:transform .25s;}
.overlay.open .modal{transform:translateY(0);}
.mhd{padding:24px 28px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
.mtitle{font-size:20px;font-weight:800;letter-spacing:-.4px;margin-bottom:8px;}
.mmeta{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.xbtn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:'Inter',sans-serif;}
.xbtn:hover{border-color:var(--accent);color:var(--accent);}
.mbody{padding:24px 28px;}
.mdesc{font-size:13.5px;color:var(--muted);line-height:1.65;margin-bottom:20px;}
.eqb{background:var(--bg3);border-radius:var(--r);padding:13px 16px;margin-bottom:20px;}
.eql{font-size:9.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.eqi{display:flex;flex-wrap:wrap;gap:5px;}
.eqitem{font-size:11.5px;font-weight:500;padding:3px 9px;border-radius:6px;background:var(--bg4);border:1px solid var(--border);color:var(--text);}
.ph{margin-bottom:20px;}
.phn{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.phn::after{content:'';flex:1;height:1px;background:var(--border);}
.ext{width:100%;border-collapse:collapse;}
.ext th{text-align:left;font-size:9.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);padding:5px 10px;border-bottom:1px solid var(--border);}
.ext td{padding:8px 10px;font-size:12.5px;border-bottom:1px solid rgba(255,255,255,.03);vertical-align:top;}
.ext tr:last-child td{border-bottom:none;}
.ext tbody tr:hover td{background:rgba(255,255,255,.02);}
.exn{font-weight:600;}
.exno{font-size:11px;color:var(--muted);font-style:italic;margin-top:3px;line-height:1.4;}
.acc{color:var(--accent);font-weight:700;}
.dim{color:var(--muted);}

/* Edit Modal */
.eoverlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.88);backdrop-filter:blur(12px);display:flex;align-items:flex-start;justify-content:center;padding:28px 20px;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .25s;}
.eoverlay.open{opacity:1;pointer-events:all;}
.emodal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);width:100%;max-width:820px;transform:translateY(16px);transition:transform .25s;}
.eoverlay.open .emodal{transform:translateY(0);}
.ehd{padding:20px 26px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.ehdtitle{font-size:17px;font-weight:800;}
.ebody{padding:22px 26px;}
.efoot{padding:16px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;}
.efoot-right{display:flex;gap:8px;}

/* Form elements */
.flabel{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:block;}
.finput,.fselect,.ftextarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px 11px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.finput:focus,.fselect:focus,.ftextarea:focus{border-color:rgba(170,255,0,.5);}
.ftextarea{resize:vertical;min-height:66px;line-height:1.5;}
.fselect{cursor:none;}
.fselect option{background:var(--bg3);}
.frow{display:grid;gap:11px;margin-bottom:14px;}
.frow.c4{grid-template-columns:3fr 1fr 1fr 1fr;}
.frow.c2{grid-template-columns:1fr 1fr;}
.frow.c1{grid-template-columns:1fr;}
.ffield{display:flex;flex-direction:column;}

/* Phase blocks in edit */
.ephases{margin-top:4px;}
.ephase{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.ephasehd{display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--bg4);border-bottom:1px solid var(--border);}
.ephasehd .finput{background:transparent;border:1px solid transparent;padding:4px 8px;font-weight:700;font-size:13px;border-radius:4px;flex:1;}
.ephasehd .finput:focus{border-color:rgba(170,255,0,.4);}
.exrows{padding:8px 12px 4px;}
.exrow-hdr{display:flex;gap:6px;padding:0 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.exrow-hdr span{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}
.exrow-hdr .span-name{flex:3;min-width:130px;}
.exrow-hdr .span-sm{flex:1;min-width:52px;}
.exrow-hdr .span-note{flex:3;min-width:120px;}
.exrow-hdr .span-del{width:28px;}
.exrow{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.exrow .finput{padding:5px 7px;font-size:12px;border-radius:6px;}
.exrow .finput.inp-name{flex:3;min-width:130px;}
.exrow .finput.inp-sm{flex:1;min-width:52px;}
.exrow .finput.inp-note{flex:3;min-width:120px;}
.ephaseft{padding:6px 12px 10px;}
.gbtn{background:transparent;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-weight:600;color:var(--muted);font-family:'Inter',sans-serif;cursor:none;transition:all .15s;}
.gbtn:hover{border-color:var(--accent);color:var(--accent);}
.rmbtn{width:24px;height:24px;border-radius:4px;background:transparent;border:1px solid transparent;color:var(--muted);font-size:12px;cursor:none;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:'Inter',sans-serif;flex-shrink:0;}
.rmbtn:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.1);}
.add-phase-btn{width:100%;background:transparent;border:1px dashed var(--border);border-radius:var(--r);padding:9px;text-align:center;font-size:12px;font-weight:600;color:var(--muted);font-family:'Inter',sans-serif;cursor:none;transition:all .15s;margin-top:4px;}
.add-phase-btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{padding:9px 20px;border-radius:8px;background:var(--accent);color:#000;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:none;border:none;transition:opacity .15s;}
.btn-primary:hover{opacity:.85;}
.btn-sec{padding:9px 20px;border-radius:8px;background:transparent;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:none;border:1px solid var(--border);transition:all .15s;}
.btn-sec:hover{border-color:var(--text);}
.btn-del{padding:9px 20px;border-radius:8px;background:transparent;color:#ef4444;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:none;border:1px solid rgba(239,68,68,.3);transition:all .15s;}
.btn-del:hover{background:rgba(239,68,68,.1);border-color:#ef4444;}
.section-lbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;display:flex;align-items:center;gap:8px;}
.section-lbl::after{content:'';flex:1;height:1px;background:var(--border);}

/* Empty */
.empty{text-align:center;padding:80px 40px;color:var(--muted);grid-column:1/-1;}
.empty-icon{font-size:44px;margin-bottom:14px;}
.empty h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px;}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px;}

@media(max-width:780px){.layout{grid-template-columns:1fr;}.sidebar{display:none;}header{padding:0 14px;}.main{padding:18px 14px;}.grid{grid-template-columns:1fr;}.frow.c4{grid-template-columns:1fr 1fr;}.frow.c2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="cur"></div><div id="ring"></div>

<header>
  <div class="logo">WORKOUT<em>BANK</em></div>
  <div class="sw">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input id="searchInput" type="text" placeholder="Search workouts, exercises…" autocomplete="off">
  </div>
  <div class="hstat"><strong id="totalCount">0</strong> workouts</div>
  <button class="new-btn" onclick="openNew()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    New Workout
  </button>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sbs">
      <div class="sbl">Categories</div>
      <div class="nav-item active" data-cat="all" onclick="setCat('all')"><span class="ni">⊞</span>All Workouts<span class="nc" id="c-all">0</span></div>
      <div class="nav-item" data-cat="strength" onclick="setCat('strength')"><span class="ni">🏋️</span>Strength<span class="nc" id="c-strength">0</span></div>
      <div class="nav-item" data-cat="endurance" onclick="setCat('endurance')"><span class="ni">🏃</span>Endurance<span class="nc" id="c-endurance">0</span></div>
      <div class="nav-item" data-cat="mobility" onclick="setCat('mobility')"><span class="ni">🧘</span>Mobility<span class="nc" id="c-mobility">0</span></div>
      <div class="nav-item" data-cat="metcon" onclick="setCat('metcon')"><span class="ni">⚡</span>Metcons<span class="nc" id="c-metcon">0</span></div>
      <div class="nav-item" data-cat="weightlifting" onclick="setCat('weightlifting')"><span class="ni">🥇</span>Olympic WL<span class="nc" id="c-weightlifting">0</span></div>
      <div class="nav-item" data-cat="hyrox" onclick="setCat('hyrox')"><span class="ni">🔥</span>Hyrox<span class="nc" id="c-hyrox">0</span></div>
    </div>
    <div class="sbs">
      <div class="sbl">Difficulty</div>
      <div class="chips">
        <div class="chip active" data-diff="all" onclick="setDiff('all')">All</div>
        <div class="chip" data-diff="easy" onclick="setDiff('easy')">Easy</div>
        <div class="chip" data-diff="moderate" onclick="setDiff('moderate')">Moderate</div>
        <div class="chip" data-diff="hard" onclick="setDiff('hard')">Hard</div>
        <div class="chip" data-diff="max effort" onclick="setDiff('max effort')">Max</div>
      </div>
    </div>
    <div class="sbs">
      <div class="sbl">Duration</div>
      <div class="chips">
        <div class="chip active" data-dur="all" onclick="setDur('all')">Any</div>
        <div class="chip" data-dur="20" onclick="setDur('20')">≤20 min</div>
        <div class="chip" data-dur="30" onclick="setDur('30')">≤30 min</div>
        <div class="chip" data-dur="60" onclick="setDur('60')">≤60 min</div>
        <div class="chip" data-dur="90" onclick="setDur('90')">≤90 min</div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="pgh">
      <div class="pgt" id="pgTitle">All <em>Workouts</em></div>
      <div class="pgc" id="pgCount"></div>
    </div>
    <div class="sorts">
      <button class="sbtn active" onclick="setSort('default',this)">Default</button>
      <button class="sbtn" onclick="setSort('dur-asc',this)">Shortest first</button>
      <button class="sbtn" onclick="setSort('dur-desc',this)">Longest first</button>
      <button class="sbtn" onclick="setSort('alpha',this)">A–Z</button>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- View Modal -->
<div class="overlay" id="viewOverlay" onclick="maybeCloseView(event)">
  <div class="modal">
    <div class="mhd">
      <div>
        <div class="mtitle" id="mTitle"></div>
        <div class="mmeta" id="mMeta"></div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;">
        <button class="xbtn" id="editFromView" onclick="editFromViewModal()" title="Edit workout" style="font-size:14px;">✏</button>
        <button class="xbtn" onclick="closeView()">✕</button>
      </div>
    </div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="eoverlay" id="editOverlay" onclick="maybeCloseEdit(event)">
  <div class="emodal">
    <div class="ehd">
      <div class="ehdtitle" id="eTitle">New Workout</div>
      <button class="xbtn" onclick="closeEdit()">✕</button>
    </div>
    <div class="ebody">
      <div class="frow c4">
        <div class="ffield"><label class="flabel">Title</label><input class="finput" id="ef-title" placeholder="Workout name…"></div>
        <div class="ffield"><label class="flabel">Category</label>
          <select class="fselect" id="ef-cat">
            <option value="strength">Strength</option>
            <option value="endurance">Endurance</option>
            <option value="mobility">Mobility</option>
            <option value="metcon">Metcon</option>
            <option value="weightlifting">Olympic WL</option>
            <option value="hyrox">Hyrox</option>
          </select>
        </div>
        <div class="ffield"><label class="flabel">Duration (min)</label><input class="finput" id="ef-dur" type="number" min="5" max="300" placeholder="60"></div>
        <div class="ffield"><label class="flabel">Difficulty</label>
          <select class="fselect" id="ef-diff">
            <option value="easy">Easy</option>
            <option value="moderate">Moderate</option>
            <option value="hard">Hard</option>
            <option value="max effort">Max Effort</option>
          </select>
        </div>
      </div>
      <div class="frow c2">
        <div class="ffield"><label class="flabel">Subcategory</label><input class="finput" id="ef-sub" placeholder="e.g. Lower Body, Zone 2…"></div>
        <div class="ffield"><label class="flabel">Tags <span style="font-size:9px;font-weight:400;text-transform:none;letter-spacing:0">(comma-separated)</span></label><input class="finput" id="ef-tags" placeholder="squat, deadlift, strength…"></div>
      </div>

// ── Storage ───────────────────────────────────────────────────
const STORE_KEY = 'wb_v4';
let DB = (() => {
  try { const s = localStorage.getItem(STORE_KEY); if(s) return JSON.parse(s); } catch(e){}
  return DEFAULT_DB.map(w => ({...w}));
})();
function persist() { try { localStorage.setItem(STORE_KEY, JSON.stringify(DB)); } catch(e){} }

// ── State ─────────────────────────────────────────────────────
const S = {cat:'all',diff:'all',dur:'all',search:'',sort:'default'};
const CTITLE = {all:'All <em>Workouts</em>',strength:'Strength <em>Training</em>',endurance:'Endurance <em>Running</em>',mobility:'Mobility <em>Work</em>',metcon:'MetCon <em>Workouts</em>',weightlifting:'Olympic <em>Weightlifting</em>',hyrox:'HYROX <em>Training</em>'};
const CLBL = {strength:'STRENGTH',endurance:'ENDURANCE',mobility:'MOBILITY',metcon:'METCON',weightlifting:'OLYMPIC WL',hyrox:'HYROX'};
const CBADGE = {strength:'bs',endurance:'be',mobility:'bm',metcon:'bc',weightlifting:'bw',hyrox:'bh'};
const DDOT = {easy:'de',moderate:'dm',hard:'dh','max effort':'dx'};
const DCLR = {easy:'#22c55e',moderate:'#f59e0b',hard:'#ef4444','max effort':'#ec4899'};

// ── Cursor ────────────────────────────────────────────────────
const cur=document.getElementById('cur'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function raf(){rx+=(mx-rx)*.11;ry+=(my-ry)*.11;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(raf);})();
document.addEventListener('mouseover',e=>{
  if(e.target.closest('.card,.nav-item,.chip,.sbtn,.xbtn,.new-btn,button,a,.card-edit')){
    cur.style.transform='translate(-50%,-50%) scale(1.7)';ring.style.width='52px';ring.style.height='52px';ring.style.opacity='.8';
  } else {
    cur.style.transform='translate(-50%,-50%) scale(1)';ring.style.width='34px';ring.style.height='34px';ring.style.opacity='.4';
  }
});

// ── Filters ───────────────────────────────────────────────────
function setCat(c){S.cat=c;document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.cat===c));document.getElementById('pgTitle').innerHTML=CTITLE[c]||CTITLE.all;render();}
function setDiff(d){S.diff=d;document.querySelectorAll('.chip[data-diff]').forEach(el=>el.classList.toggle('active',el.dataset.diff===d));render();}
function setDur(d){S.dur=d;document.querySelectorAll('.chip[data-dur]').forEach(el=>el.classList.toggle('active',el.dataset.dur===d));render();}
function setSort(s,btn){S.sort=s;document.querySelectorAll('.sbtn').forEach(el=>el.classList.remove('active'));btn.classList.add('active');render();}
document.getElementById('searchInput').addEventListener('input',e=>{S.search=e.target.value.toLowerCase().trim();render();});

function filtered(){
  let w=[...DB];
  if(S.cat!=='all')  w=w.filter(x=>x.cat===S.cat);
  if(S.diff!=='all') w=w.filter(x=>x.diff===S.diff);
  if(S.dur!=='all')  w=w.filter(x=>x.dur<=+S.dur);
  if(S.search) w=w.filter(x=>x.title.toLowerCase().includes(S.search)||x.desc.toLowerCase().includes(S.search)||x.sub.toLowerCase().includes(S.search)||x.tags.some(t=>t.toLowerCase().includes(S.search)));
  if(S.sort==='dur-asc')  w.sort((a,b)=>a.dur-b.dur);
  if(S.sort==='dur-desc') w.sort((a,b)=>b.dur-a.dur);
  if(S.sort==='alpha')    w.sort((a,b)=>a.title.localeCompare(b.title));
  return w;
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const list=filtered();
  const grid=document.getElementById('grid');
  ['all','strength','endurance','mobility','metcon','weightlifting','hyrox'].forEach(c=>{
    const n=c==='all'?DB.length:DB.filter(x=>x.cat===c).length;
    document.getElementById('c-'+c).textContent=n;
  });
  document.getElementById('totalCount').textContent=DB.length;
  document.getElementById('pgCount').textContent=list.length+' workout'+(list.length!==1?'s':'');
  if(!list.length){grid.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><h3>No workouts found</h3><p>Adjust your filters or search term.</p></div>`;return;}
  grid.innerHTML=list.map(w=>{
    const exc=w.phases.reduce((s,p)=>s+p.ex.length,0);
    return`<div class="card" onclick="openView(${w.id})">
      <button class="card-edit" onclick="event.stopPropagation();openEdit(${w.id})" title="Edit">✏</button>
      <div class="ctop"><span class="badge ${CBADGE[w.cat]}">${CLBL[w.cat]}</span><div class="ddot ${DDOT[w.diff]}" title="${w.diff}"></div></div>
      <div class="ctitle">${esc(w.title)}</div>
      <div class="cdesc">${esc(w.desc)}</div>
      <div class="cmeta">
        <div class="cm"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${w.dur} min</div>
        <div class="cm" style="color:${DCLR[w.diff]}">${w.diff}</div>
        <div class="cm">${exc} exercises</div>
      </div>
      <div class="ctags">${w.tags.slice(0,4).map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>
    </div>`;
  }).join('');
}

// ── View Modal ────────────────────────────────────────────────
let viewId=null;
function openView(id){
  viewId=id;
  const w=DB.find(x=>x.id===id);
  if(!w)return;
  document.getElementById('mTitle').textContent=w.title;
  document.getElementById('mMeta').innerHTML=`<span class="badge ${CBADGE[w.cat]}">${CLBL[w.cat]}</span><span style="font-size:12px;font-weight:600;color:${DCLR[w.diff]}">${w.diff}</span><span class="dim" style="font-size:12px">⏱ ${w.dur} min</span><span style="font-size:11px;color:var(--muted);background:var(--bg4);padding:2px 8px;border-radius:4px;border:1px solid var(--border)">${esc(w.sub)}</span>`;
  let html='';
  if(w.desc)html+=`<p class="mdesc">${esc(w.desc)}</p>`;
  if(w.gear&&w.gear.length)html+=`<div class="eqb"><div class="eql">Equipment</div><div class="eqi">${w.gear.map(g=>`<span class="eqitem">${esc(g)}</span>`).join('')}</div></div>`;
  html+=w.phases.map(p=>`<div class="ph"><div class="phn">${esc(p.name)}</div><table class="ext"><thead><tr><th style="width:38%">Exercise</th><th>Sets</th><th>Reps</th><th>Weight</th><th>Rest</th></tr></thead><tbody>${p.ex.map(e=>`<tr><td><div class="exn">${esc(e.n)}</div>${e.note?`<div class="exno">${esc(e.note)}</div>`:''}</td><td><span class="${e.s&&e.s!=='—'?'acc':'dim'}">${esc(e.s||'—')}</span></td><td class="dim">${esc(e.r||'—')}</td><td class="dim">${esc(e.w||'—')}</td><td class="dim">${esc(e.rest||'—')}</td></tr>`).join('')}</tbody></table></div>`).join('');
  document.getElementById('mBody').innerHTML=html;
  document.getElementById('viewOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeView(){document.getElementById('viewOverlay').classList.remove('open');document.body.style.overflow='';}
function maybeCloseView(e){if(e.target===document.getElementById('viewOverlay'))closeView();}
function editFromViewModal(){const id=viewId;closeView();openEdit(id);}

// ── Edit Modal ────────────────────────────────────────────────
let editId=null;
let formPhases=[];

function openNew(){
  editId=null;
  document.getElementById('eTitle').textContent='New Workout';
  document.getElementById('eDelBtn').style.display='none';
  fillForm({cat:'strength',diff:'moderate',dur:60,tags:[],gear:[],phases:[{name:'Warm-Up',ex:[{n:'',s:'',r:'',w:'',rest:'',note:''}]},{name:'Main Work',ex:[{n:'',s:'3',r:'10',w:'',rest:'2:00',note:''}]}]});
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function openEdit(id){
  editId=id;
  const w=DB.find(x=>x.id===id);
  if(!w)return;
  document.getElementById('eTitle').textContent='Edit Workout';
  document.getElementById('eDelBtn').style.display='';
  fillForm(w);
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('open');document.body.style.overflow='';}
function maybeCloseEdit(e){if(e.target===document.getElementById('editOverlay'))closeEdit();}

function fillForm(w){
  document.getElementById('ef-title').value=w.title||'';
  document.getElementById('ef-cat').value=w.cat||'strength';
  document.getElementById('ef-dur').value=w.dur||60;
  document.getElementById('ef-diff').value=w.diff||'moderate';
  document.getElementById('ef-sub').value=w.sub||'';
  document.getElementById('ef-tags').value=(w.tags||[]).join(', ');
  document.getElementById('ef-desc').value=w.desc||'';
  document.getElementById('ef-gear').value=(w.gear||[]).join(', ');
  formPhases=JSON.parse(JSON.stringify(w.phases||[]));
  renderPhases();
}

function renderPhases(){
  document.getElementById('ef-phases').innerHTML=formPhases.map((p,pi)=>`
    <div class="ephase">
      <div class="ephasehd">
        <input class="finput inp-pname" data-pi="${pi}" value="${escA(p.name)}" placeholder="Phase name…">
        <button class="gbtn" onclick="removePhase(${pi})">Remove phase</button>
      </div>
      <div class="exrows">
        <div class="exrow-hdr">
          <span class="span-name">Exercise</span>
          <span class="span-sm">Sets</span>
          <span class="span-sm">Reps</span>
          <span class="span-sm">Weight</span>
          <span class="span-sm">Rest</span>
          <span class="span-note">Notes</span>
          <span class="span-del"></span>
        </div>
        ${p.ex.map((e,ei)=>`
        <div class="exrow">
          <input class="finput inp-name" data-pi="${pi}" data-ei="${ei}" value="${escA(e.n)}" placeholder="Exercise name…">
          <input class="finput inp-sm" data-pi="${pi}" data-ei="${ei}" data-f="s" value="${escA(e.s)}" placeholder="Sets">
          <input class="finput inp-sm" data-pi="${pi}" data-ei="${ei}" data-f="r" value="${escA(e.r)}" placeholder="Reps">
          <input class="finput inp-sm" data-pi="${pi}" data-ei="${ei}" data-f="w" value="${escA(e.w||'')}" placeholder="Wt">
          <input class="finput inp-sm" data-pi="${pi}" data-ei="${ei}" data-f="rest" value="${escA(e.rest||'')}" placeholder="Rest">
          <input class="finput inp-note" data-pi="${pi}" data-ei="${ei}" data-f="note" value="${escA(e.note||'')}" placeholder="Notes…">
          <button class="rmbtn" onclick="removeEx(${pi},${ei})">✕</button>
        </div>`).join('')}
      </div>
      <div class="ephaseft">
        <button class="gbtn" onclick="addEx(${pi})">+ Add exercise</button>
      </div>
    </div>`).join('');
}

function syncFromDOM(){
  document.querySelectorAll('.inp-pname').forEach(el=>{
    formPhases[+el.dataset.pi].name=el.value;
  });
  document.querySelectorAll('#ef-phases .exrow').forEach(row=>{
    const pi=+row.querySelector('.inp-name').dataset.pi;
    const ei=+row.querySelector('.inp-name').dataset.ei;
    const ex=formPhases[pi].ex[ei];
    ex.n=row.querySelector('.inp-name').value;
    row.querySelectorAll('[data-f]').forEach(inp=>{ex[inp.dataset.f]=inp.value;});
  });
}

function addPhase(){syncFromDOM();formPhases.push({name:'Phase '+(formPhases.length+1),ex:[{n:'',s:'',r:'',w:'',rest:'',note:''}]});renderPhases();}
function removePhase(pi){syncFromDOM();formPhases.splice(pi,1);renderPhases();}
function addEx(pi){syncFromDOM();formPhases[pi].ex.push({n:'',s:'',r:'',w:'',rest:'',note:''});renderPhases();}
function removeEx(pi,ei){syncFromDOM();formPhases[pi].ex.splice(ei,1);renderPhases();}

function collectForm(){
  syncFromDOM();
  return{
    id:editId||Date.now(),
    title:document.getElementById('ef-title').value.trim()||'Untitled Workout',
    cat:document.getElementById('ef-cat').value,
    sub:document.getElementById('ef-sub').value.trim(),
    dur:parseInt(document.getElementById('ef-dur').value)||60,
    diff:document.getElementById('ef-diff').value,
    desc:document.getElementById('ef-desc').value.trim(),
    tags:document.getElementById('ef-tags').value.split(',').map(t=>t.trim()).filter(Boolean),
    gear:document.getElementById('ef-gear').value.split(',').map(g=>g.trim()).filter(Boolean),
    phases:JSON.parse(JSON.stringify(formPhases)),
  };
}

function saveWorkout(){
  const w=collectForm();
  if(editId){const i=DB.findIndex(x=>x.id===editId);if(i!==-1)DB[i]=w;}
  else DB.push(w);
  persist();
  closeEdit();
  render();
}

function deleteWorkout(){
  if(!editId)return;
  if(!confirm('Delete this workout? This cannot be undone.'))return;
  DB=DB.filter(x=>x.id!==editId);
  persist();
  closeEdit();
  render();
}

// ── Utils ─────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeView();closeEdit();}});

// ── Init ──────────────────────────────────────────────────────
render();
</script>
